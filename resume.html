<!doctype html>
<html lang="en">
	<head>
		<!-- Thanks for reading my code -->
		<title>Jorge Domínguez Arnáez Software Developer Resume</title>

		<!-- UTF 8 as my Character Set -->
		<meta charset="utf-8" />

		<!-- Set the Viewport for good mobile behavior -->
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Favicon made by yours truly -->
		<link rel="shortcut icon" href="resources/favicon.ico" />
	</head>

	<body>
		<script type="module">
			import { render } from "https://cdn.jsdelivr.net/npm/jsonresume-theme-bluetime/dist/index.min.js";

			fetch(
				"https://gist.githubusercontent.com/BlueSialia/583aacce1c60868ca91c24c3b5f8bedb/raw",
			)
				.then((response) => response.json())
				.then((data) => {
					const resumeHTML = render(data);
					document.body.innerHTML = resumeHTML;
				})
				.catch((error) => {
					console.error("Error fetching JSON data:", error);
				});
		</script>
	</body>
</html>
